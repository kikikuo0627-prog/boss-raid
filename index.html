<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDRaGON RAID SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; }
        .boss-card { background: linear-gradient(180deg, #161b22 0%, #0d1117 100%); border: 1px solid #30363d; border-radius: 1.5rem; }
        .input-dark { background-color: #0d1117; border: 1px solid #30363d; color: white; border-radius: 0.75rem; padding: 0.75rem; outline: none; }
        .input-dark:focus { border-color: #58a6ff; }
        select { appearance: none; cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-10 font-sans">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black italic text-white tracking-tighter">GDRaGON</h1>
                <p class="text-xs text-indigo-400 font-bold tracking-widest">RAID SYSTEM</p>
            </div>
            <button onclick="toggleAdmin()" class="text-xs text-gray-500 hover:text-white border border-gray-800 px-4 py-2 rounded-full">隊長控制台</button>
        </header>

        <!-- 隊長控制台 -->
        <div id="adminPanel" class="hidden boss-card p-8 mb-10 border-indigo-500/50">
            <h2 class="text-indigo-400 font-bold mb-4">🛡️ 隊長控制模式</h2>
            <div class="space-y-4">
                <input type="password" id="adminPwd" placeholder="管理密碼" class="w-full input-dark">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-xs text-gray-500">快速設定場次 (格式: BOSS,時間 | 範例: 炎魔,20:00)</label>
                        <textarea id="sessionInput" class="w-full input-dark h-24" placeholder="炎魔,20:00&#10;龍王,21:00"></textarea>
                    </div>
                    <div class="flex flex-col gap-2 justify-end">
                        <button onclick="saveSessions()" class="bg-indigo-600 hover:bg-indigo-500 text-white py-3 rounded-xl font-bold">更新場次選單</button>
                        <button onclick="clearMembers()" class="bg-red-900/30 hover:bg-red-900/50 text-red-400 py-3 rounded-xl font-bold border border-red-900/50">清空目前所有名單</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <!-- 報名表單 -->
            <div class="lg:col-span-1">
                <div class="boss-card p-6 sticky top-10">
                    <h3 class="text-white font-bold mb-6 flex items-center gap-2">⚔️ 立即報名</h3>
                    <form id="joinForm" class="space-y-5">
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 uppercase">挑戰場次</label>
                            <select id="sessionId" class="w-full input-dark mt-1" required>
                                <option value="">載入中...</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-500 uppercase">角色 ID</label>
                            <input id="userName" placeholder="輸入 ID" required class="w-full input-dark mt-1">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <input id="userLv" type="number" placeholder="等級" required class="w-full input-dark">
                            <select id="userJob" class="w-full input-dark">
                                <option>主教</option><option>夜使者</option><option>英雄</option>
                                <option>聖騎士</option><option>影武者</option><option>開拓者</option>
                            </select>
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-xl font-bold transition-all">確認提交報名</button>
                    </form>
                </div>
            </div>

            <!-- 名單顯示 -->
            <div class="lg:col-span-2">
                <div id="sessionLists" class="space-y-10">
                    <!-- 這裡會按場次動態生成名單卡片 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://boss.kikikuo0627.workers.dev/"; // 👈 請確認這是你的網址

        function toggleAdmin() {
            document.getElementById('adminPanel').classList.toggle('hidden');
        }

        const loadData = async () => {
            const res = await fetch(`${API_URL}/api/data`);
            const { sessions, members } = await res.json();

            // 更新報名選單
            const select = document.getElementById('sessionId');
            select.innerHTML = '<option value="">請選擇場次</option>' + 
                sessions.map(s => `<option value="${s.id}">${s.boss} [${s.time}]</option>`).join('');

            // 按場次分組顯示名單
            const listContainer = document.getElementById('sessionLists');
            listContainer.innerHTML = sessions.map(s => {
                const sMembers = members.filter(m => m.sid == s.id);
                return `
                    <div class="boss-card p-6 border-slate-800">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-xl font-bold text-white">${s.boss} <span class="text-indigo-400 text-sm ml-2">${s.time}</span></h3>
                            <span class="text-xs text-gray-500">${sMembers.length} / 6 人</span>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            ${sMembers.map(m => `
                                <div class="bg-[#0d1117] p-3 rounded-lg border border-slate-800 flex justify-between items-center">
                                    <div>
                                        <span class="text-indigo-400 font-bold text-xs">[${m.job}]</span>
                                        <span class="text-white ml-2">${m.name}</span>
                                    </div>
                                    <span class="text-[10px] text-gray-600">Lv.${m.lv}</span>
                                </div>
                            `).join('') || '<p class="text-gray-700 text-sm">目前尚無人報名</p>'}
                        </div>
                    </div>
                `;
            }).join('');
        };

        // 隊員報名
        document.getElementById('joinForm').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                sid: document.getElementById('sessionId').value,
                name: document.getElementById('userName').value,
                lv: document.getElementById('userLv').value,
                job: document.getElementById('userJob').value
            };
            await fetch(`${API_URL}/api/join`, { method: 'POST', body: JSON.stringify(payload) });
            e.target.reset();
            loadData();
        };

        // 隊長：儲存場次
        async function saveSessions() {
            const pwd = document.getElementById('adminPwd').value;
            const raw = document.getElementById('sessionInput').value;
            const sessions = raw.split('\n').filter(line => line.includes(',')).map((line, i) => {
                const [boss, time] = line.split(',');
                return { id: i + 1, boss: boss.trim(), time: time.trim() };
            });
            const res = await fetch(`${API_URL}/api/admin/update`, {
                method: 'POST',
                body: JSON.stringify({ pwd, sessions })
            });
            if (res.ok) { alert("場次更新成功！"); loadData(); } else { alert("密碼錯誤"); }
        }

        // 隊長：清空名單
        async function clearMembers() {
            if (!confirm("確定要清空所有報名名單嗎？")) return;
            const pwd = document.getElementById('adminPwd').value;
            const res = await fetch(`${API_URL}/api/admin/clear`, {
                method: 'POST',
                body: JSON.stringify({ pwd })
            });
            if (res.ok) { loadData(); } else { alert("密碼錯誤"); }
        }

        loadData();
    </script>
</body>
</html>
