<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDRaGON 突擊組隊系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 這裡可以放你截圖中看到的深色自訂樣式 */
        body { background-color: #0d1117; color: #c9d1d9; }
        .boss-card { background: rgba(22, 27, 34, 0.8); border: 1px solid #30363d; border-radius: 1rem; }
    </style>
</head>
<body class="p-6 font-sans">
    <div class="max-w-md mx-auto">
        <h1 class="text-3xl font-black italic text-white mb-2">GDRaGON</h1>
        <p class="text-indigo-400 text-xs mb-8 tracking-widest uppercase">Raid System</p>

        <!-- 表單部分 -->
        <div class="boss-card p-6 shadow-xl mb-10">
            <form id="f" class="space-y-4">
                <input id="n" placeholder="角色 ID" required class="w-full bg-[#0d1117] border border-[#30363d] p-3 rounded-lg outline-none focus:border-indigo-500">
                <div class="grid grid-cols-2 gap-4">
                    <input id="lv" type="number" placeholder="等級" required class="w-full bg-[#0d1117] border border-[#30363d] p-3 rounded-lg outline-none">
                    <select id="j" class="w-full bg-[#0d1117] border border-[#30363d] p-3 rounded-lg outline-none text-gray-400">
                        <option>主教</option><option>夜使者</option><option>英雄</option>
                        <!-- 可自行增加職業 -->
                    </select>
                </div>
                <input id="dt" type="datetime-local" required class="w-full bg-[#0d1117] border border-[#30363d] p-3 rounded-lg outline-none">
                <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition-all">立即提交報名</button>
            </form>
        </div>

        <!-- 名單部分 -->
        <h2 class="text-xl font-bold mb-4 flex justify-between">目前名單 <span id="c" class="text-sm text-indigo-400">載入中...</span></h2>
        <ul id="l" class="space-y-3"></ul>
    </div>

    <script>
        // *** https://boss.kikikuo0627.workers.dev/ ***
        const API_URL = "https://boss.kikikuo0627.workers.dev";

        const load = async () => {
            const res = await fetch(`${API_URL}/api/list`);
            const data = await res.json();
            document.getElementById('c').innerText = `共 ${data.length} 人`;
            document.getElementById('l').innerHTML = data.map(m => `
                <li class="p-4 boss-card flex justify-between items-center border border-[#30363d]">
                    <div>
                        <span class="text-indigo-400 font-bold">[${m.j}]</span>
                        <span class="ml-1 text-white">${m.n}</span>
                        <div class="text-[10px] text-gray-500 mt-1">📅 ${m.date.replace('T', ' ')}</div>
                    </div>
                    <span class="text-xs bg-gray-800 px-2 py-1 rounded text-gray-400">Lv.${m.lv}</span>
                </li>
            `).join('');
        };

        document.getElementById('f').onsubmit = async (e) => {
            e.preventDefault();
            const payload = { 
                n: document.getElementById('n').value, 
                j: document.getElementById('j').value, 
                lv: document.getElementById('lv').value, 
                date: document.getElementById('dt').value 
            };
            await fetch(`${API_URL}/api/join`, { 
                method: 'POST', 
                body: JSON.stringify(payload) 
            });
            e.target.reset();
            load();
        };
        load();
    </script>
</body>
</html>
